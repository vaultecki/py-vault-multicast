name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install system Qt dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libegl1 libxkbcommon0 libdbus-1-3 libxcb-cursor0 \
            libxcb-icccm4 libxcb-image0 libxcb-keysyms1 libxcb-randr0 \
            libxcb-render-util0 libxcb-shape0 libxcb-xinerama0

      - name: Install package with dev dependencies
        run: pip install ".[dev]"

      - name: Ruff
        run: ruff check .

      - name: mypy
        run: mypy vault_multicast.py vault_multicast_service_discovery.py

      - name: pytest
        env:
          QT_QPA_PLATFORM: offscreen
        run: pytest tests/ -v
